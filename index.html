<script id="chapter-data" type="application/json">{"overview": {"title": "1. Virginia Wine — An Overview", "shortTitle": "Virginia Wine — An Overview", "icon": "🍷", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Virginia Wine — An Overview</div>\n<div class=\"section-sub\">History, key statistics, and why Virginia matters for WSET study</div>\n</div>\n<div class=\"callout\">\n<strong>WSET Relevance:</strong> Virginia appears in WSET Level 3 and Level 4 (Diploma) curricula as part of the study of emerging New World wine regions and Eastern United States viticulture. Examiners frequently ask about Virginia's key grape varieties (Cabernet Franc, Viognier), its AVA system, and its humid continental climate challenges.\n  </div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Historical context</h3><span class=\"tag\">Since 1607</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia has the longest history of viticulture in North America. The first recorded attempts to make wine were made by English settlers at Jamestown in 1607 using native Vitis labrusca grapes. Thomas Jefferson — the third President and an ardent Francophile — planted European vinifera varieties at Monticello in the late 18th century, famously predicting that Virginia would one day produce wines to rival France's finest. Jefferson's vision was largely thwarted by the phylloxera louse, fungal diseases, and the difficulties of cultivating Vitis vinifera in Virginia's humid climate.</p>\n<p>The modern Virginia wine industry truly began with the establishment of Meredyth Vineyard in 1972, the first modern farm winery under Virginia's then-new Farm Winery Act. The state's industry expanded rapidly through the 1980s and 1990s, and received enormous momentum when the Monticello AVA was established in 1984. By the 2000s, Virginia was being recognised as a serious producer of Cabernet Franc, Viognier, and Chardonnay.</p>\n<p>Today Virginia is home to over 300 wineries and more than 4,000 acres under vine, making it one of the most important wine states on the East Coast and the 5th largest wine-producing state in the USA.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia at a glance</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"data-row\"><span class=\"data-label\">Total wineries</span><span class=\"data-badge\">300+</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Vineyard acreage</span><span class=\"data-badge\">~4,100 acres</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Number of AVAs</span><span class=\"data-badge\">9 AVAs</span></div>\n<div class=\"data-row\"><span class=\"data-label\">US rank by production</span><span class=\"data-badge\">5th largest</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Flagship red grape</span><span class=\"data-badge\">Cabernet Franc</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Flagship white grape</span><span class=\"data-badge\">Viognier</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Principal AVA</span><span class=\"data-badge\">Monticello</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Climate type</span><span class=\"data-badge\">Humid Continental</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Annual rainfall</span><span class=\"data-badge\">~40 inches (1,000mm)</span></div>\n<div class=\"data-row\"><span class=\"data-label\">First Farm Winery Act</span><span class=\"data-badge\">1980</span></div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia's identity as a wine region</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia's wine identity is shaped by the interplay of its Blue Ridge Mountains, its Piedmont plateau, and its proximity to the Chesapeake Bay. Unlike California or the Pacific Northwest, Virginia's wine character is fundamentally defined by managing a difficult humid climate — a characteristic the state shares with regions like Bordeaux and Germany rather than the reliably sunny western states.</p>\n<p>The state has settled on <strong>Cabernet Franc</strong> and <strong>Viognier</strong> as its signature varieties because they ripen fully in Virginia's relatively short growing season and tolerate the humidity better than Cabernet Sauvignon or Syrah. Petit Verdot, which struggles to ripen in Bordeaux, finds a hospitable home in Virginia's warm summers. Chardonnay and Petit Manseng round out the core white offering.</p>\n<div class=\"callout\"><strong>Exam tip:</strong> Virginia is often contrasted with New York (Finger Lakes) in WSET discussions of eastern US wine. Know the key differences: Virginia = warmer, redder wines, humid continental; Finger Lakes = cool, Riesling-focused, lake-influenced continental climate.</div>\n<div class=\"pill-grid\">\n<span class=\"pill red\">Cabernet Franc</span>\n<span class=\"pill red\">Petit Verdot</span>\n<span class=\"pill red\">Merlot</span>\n<span class=\"pill white\">Viognier</span>\n<span class=\"pill white\">Chardonnay</span>\n<span class=\"pill white\">Petit Manseng</span>\n<span class=\"pill region\">Monticello AVA</span>\n<span class=\"pill region\">Shenandoah Valley</span>\n<span class=\"pill style\">Humid Continental</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Thomas Jefferson's legacy</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Thomas Jefferson is arguably the most important figure in the history of American wine. As Minister to France (1784–1789), he developed a deep knowledge of French wines — particularly Burgundy, Bordeaux, and the Rhône — and aspired to replicate them at his estate, Monticello, in Charlottesville, Virginia. He planted European Vitis vinifera vines on multiple occasions between 1774 and 1824, and yet never succeeded in producing a drinkable wine.</p>\n<p>Jefferson's failure was not due to lack of effort or knowledge but to forces largely beyond 18th-century understanding: phylloxera vastatrix (the root louse), Pierce's Disease (a bacterial infection spread by the glassy-winged sharpshooter), and chronic botrytis and downy mildew caused by Virginia's summer humidity. These same challenges continue to define viticulture in the state today.</p>\n<p>Today, Jefferson Vineyards operates adjacent to Monticello's original vineyard sites, and the Monticello AVA — named in his honour — is Virginia's most prestigious appellation. Jefferson's legacy is commemorated on Virginia Wine's official promotional materials and is central to the region's identity.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia vs. other eastern US regions</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<table class=\"compare-table\">\n<tbody><tr><th>Feature</th><th>Virginia</th><th>Finger Lakes (NY)</th><th>Long Island (NY)</th></tr>\n<tr><td>Climate</td><td>Humid Continental</td><td>Cool Continental (lake-modified)</td><td>Maritime (Atlantic)</td></tr>\n<tr><td>Key whites</td><td>Viognier, Chardonnay, Petit Manseng</td><td>Riesling, Gewürztraminer</td><td>Chardonnay, Sauvignon Blanc</td></tr>\n<tr><td>Key reds</td><td>Cabernet Franc, Petit Verdot</td><td>Pinot Noir, Cabernet Franc</td><td>Merlot, Cabernet Sauvignon</td></tr>\n<tr><td>Main challenge</td><td>Summer humidity / fungal disease</td><td>Short season, winter cold</td><td>Atlantic storms, hurricane risk</td></tr>\n<tr><td>Wine style</td><td>Rich, warm, aromatic</td><td>Crisp, mineral, off-dry</td><td>Bordeaux-like, structured</td></tr>\n<tr><td># Wineries</td><td>300+</td><td>130+</td><td>60+</td></tr>\n</tbody></table>\n</div></div>\n"}, "regions": {"title": "2. Virginia's AVAs", "shortTitle": "Virginia's AVAs", "icon": "🗺️", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Virginia's AVAs</div>\n<div class=\"section-sub\">American Viticultural Areas — the nine official wine appellations</div>\n</div>\n<div class=\"wset-note\">\n<strong>WSET note on AVA labelling:</strong> A wine may use an AVA name on its label only if at least 85% of the grapes used were grown within that AVA. This is the same federal rule that applies across all US wine regions. Unlike EU DOP/IGP systems, AVAs define geography only — not permitted varieties, yields, or minimum quality standards.\n  </div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Monticello AVA</h3><span class=\"tag\">Most Prestigious</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Established in 1984, Monticello is Virginia's best-known and most prestigious AVA, centred around Charlottesville in the Piedmont foothills of the Blue Ridge Mountains. The AVA takes its name from Thomas Jefferson's estate and encompasses approximately 700 square miles in Albemarle, Greene, Nelson, and Orange counties.</p>\n<p>The region sits at elevations of 300–900 feet (90–275m), providing critical air drainage that reduces frost risk and allows cool nights to preserve acidity. Soils are primarily red clay loams derived from Precambrian granite and metamorphic rocks. The proximity to the Blue Ridge creates afternoon cloud cover that moderates extreme summer heat.</p>\n<p><strong>Key producers:</strong> King Family Vineyards, Barboursville Vineyards (est. 1976 by Italian house Zonin — a landmark for quality), Jefferson Vineyards, Trump Winery (formerly Kluge Estate), Keswick Vineyards, Michael Shaps Wineworks.</p>\n<div class=\"pill-grid\">\n<span class=\"pill red\">Cabernet Franc</span>\n<span class=\"pill red\">Merlot</span>\n<span class=\"pill white\">Viognier</span>\n<span class=\"pill white\">Chardonnay</span>\n<span class=\"pill style\">Elevation: 300–900 ft</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Shenandoah Valley AVA</h3><span class=\"tag\">Shared with WV</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>The Shenandoah Valley AVA straddles the border of Virginia and West Virginia, occupying the long valley between the Blue Ridge Mountains to the east and the Allegheny Mountains to the west. It is a large appellation with diverse elevations ranging from 500 to 1,200 feet.</p>\n<p>The valley's sheltered position between the two mountain ranges creates a rain shadow effect, making it one of Virginia's drier growing regions — a significant advantage in disease management. Limestone and shale-based soils give some wines a distinct mineral character. The region produces well-structured reds, particularly Cabernet Franc and Petit Verdot, as well as elegant whites including Chardonnay and Riesling.</p>\n<p><strong>Key producers:</strong> Rappahannock Cellars, Glen Manor Vineyards, Linden Vineyards (widely regarded as one of Virginia's finest), Bluemont Vineyard.</p>\n<div class=\"pill-grid\">\n<span class=\"pill red\">Cabernet Franc</span>\n<span class=\"pill red\">Petit Verdot</span>\n<span class=\"pill white\">Chardonnay</span>\n<span class=\"pill white\">Riesling</span>\n<span class=\"pill style\">Rain shadow effect</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Northern Neck George Washington Birthplace AVA</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Located on a peninsula between the Potomac and Rappahannock rivers as they flow into the Chesapeake Bay, this AVA has a notably maritime character compared to Virginia's inland regions. The surrounding water bodies moderate temperatures — reducing both summer heat peaks and winter cold extremes — creating a longer growing season than many other Virginia AVAs.</p>\n<p>Sandy loam soils and lower elevations (mostly below 200 feet) contribute to a warmer, more maritime style. Merlot, Chardonnay, and Cabernet Franc perform well here. The maritime influence can also bring Atlantic hurricane-related weather in late summer, which is a vintage-defining risk factor.</p>\n<div class=\"pill-grid\">\n<span class=\"pill red\">Merlot</span>\n<span class=\"pill red\">Cabernet Franc</span>\n<span class=\"pill white\">Chardonnay</span>\n<span class=\"pill style\">Maritime influence</span>\n<span class=\"pill style\">Sandy loam soils</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Eastern Shore AVA</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia's Eastern Shore AVA occupies the narrow Delmarva Peninsula that separates the Chesapeake Bay from the Atlantic Ocean. It is Virginia's smallest wine region and the most distinctly maritime. The surrounding water mass keeps temperatures mild year-round and the growing season is among the longest in the state.</p>\n<p>The flat topography and sandy, well-draining soils make irrigation management straightforward but disease pressure from humidity and proximity to water remains significant. The region is better known for its agricultural heritage (seafood, truck farming) than wine, with only a handful of wineries in production.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>North Fork of Roanoke AVA</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Established in 1983, the North Fork of Roanoke AVA is one of Virginia's oldest, located in the Blue Ridge foothills of southwest Virginia near Salem. The North Fork of the Roanoke River runs through the valley, and north-facing slopes along its banks benefit from cool air drainage, making this a particularly suitable site for Riesling and other aromatic whites.</p>\n<p>The AVA is small and has relatively few producers, but its distinctive north-facing slope microclimate and slate-based soils give wines a clarity and cool-climate character unusual in Virginia.</p>\n<div class=\"pill-grid\">\n<span class=\"pill white\">Riesling</span>\n<span class=\"pill style\">North-facing slopes</span>\n<span class=\"pill style\">Slate soils</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Rocky Knob AVA</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Rocky Knob AVA sits in Floyd County at the foot of the Blue Ridge Parkway, one of Virginia's highest and coolest viticultural zones. Elevations range from 1,400 to 2,000 feet, producing some of Virginia's most delicate and acid-driven wines. The AVA is best known for its cool-climate Riesling and structured Chardonnay.</p>\n<p>The high altitude shortens the growing season and intensifies the diurnal temperature variation, preserving natural acidity and freshness in the grapes. Only a handful of producers operate here, but the quality can be exceptional.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Middleburg Virginia AVA</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Approved in 2012, Middleburg Virginia AVA is located in Loudoun County in the northern Virginia Piedmont, between Washington D.C. and the Blue Ridge Mountains. It is one of Virginia's newest and fastest-growing regions, benefiting from proximity to the nation's capital and its large base of affluent wine consumers.</p>\n<p>Soils are a mix of clay and loam over granite and greenstone parent rock. The region has carved a niche for Cabernet Franc, Merlot, and sparkling wines. The proximity to Washington D.C. has attracted significant investment and a wave of new estate wineries.</p>\n<p><strong>Key producers:</strong> Boxwood Estate Winery, Chrysalis Vineyards (also known for Norton/Viognier), Pearmund Cellars, Stone Tower Winery.</p>\n<div class=\"pill-grid\">\n<span class=\"pill red\">Cabernet Franc</span>\n<span class=\"pill red\">Merlot</span>\n<span class=\"pill sparkling\">Sparkling</span>\n<span class=\"pill style\">DC proximity</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia's Eastern Shore AVA &amp; Rappahannock County AVA</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>The <strong>Rappahannock County AVA</strong> (approved 2016) is Virginia's newest appellation, occupying a high-elevation section of the Blue Ridge foothills in Rappahannock County. The cool temperatures and significant rainfall at these elevations (600–1,400 feet) produce wines of higher natural acidity and lighter body, particularly well suited to aromatic whites and light-bodied reds.</p>\n<div class=\"region-grid\" style=\"margin-top:.5rem;\">\n<div class=\"region-card\"><h4>Established AVAs (9 total)</h4><p>Monticello · Shenandoah Valley · Northern Neck GWB · Eastern Shore · North Fork of Roanoke · Rocky Knob · Middleburg Virginia · Rappahannock County · Old Rag Mountain</p></div>\n<div class=\"region-card\"><h4>Old Rag Mountain AVA</h4><p>Smallest and most recently approved; focused on a single granitic outcrop in the Blue Ridge producing mineral, high-elevation wines. Only a few producers.</p></div>\n</div>\n</div></div>\n"}, "grapes": {"title": "3. Key Grape Varieties", "shortTitle": "Key Grape Varieties", "icon": "🍇", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Key Grape Varieties</div>\n<div class=\"section-sub\">Virginia's principal vinifera and hybrid varieties — profiles, flavour descriptors, and WSET exam notes</div>\n</div>\n<div class=\"callout\">\n<strong>Virginia's philosophy:</strong> After decades of trial and error, Virginia's growers have largely abandoned Cabernet Sauvignon as a primary variety (too late-ripening) in favour of <strong>Cabernet Franc</strong> (earlier ripening, more disease-resistant) and <strong>Petit Verdot</strong> (which thrives in Virginia's warm summers). For whites, <strong>Viognier</strong> has become the state's signature, offering rich aromatics without requiring the extended hang time that Chardonnay demands.\n  </div>\n RED VARIETIES \n<div class=\"section-header\" style=\"margin-top:1.5rem;\">\n<div class=\"section-title\" style=\"font-size:17px;\">Red Varieties</div>\n</div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Cabernet Franc</h3><span class=\"tag\">Flagship Red</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Cabernet Franc is Virginia's most important red variety and the grape that most defines the state's red wine identity. It ripens 2–3 weeks earlier than Cabernet Sauvignon, allowing full maturity before Virginia's problematic autumn rains and hurricane-season weather. It is also more resistant to the spring frost events that occasionally hit the Blue Ridge foothills.</p>\n<p><strong>Typical flavour profile in Virginia:</strong> Red and black cherries, raspberries, roasted red pepper, violet, dried herbs (tarragon, thyme), graphite, and tobacco leaf. Tannins are medium to medium-plus, with firmer structure than French Loire Valley examples (Chinon, Bourgueil) but without the weight of Napa Cabernet Sauvignon.</p>\n<p><strong>Style range:</strong> Virginia Cab Franc ranges from lighter, more Loire-like bottlings (unoaked or lightly oaked, freshly herbal) to more Bordeaux-inflected, barrel-aged examples with darker fruit and cedar notes. The best examples achieve real complexity — Barboursville Vineyards' Reserve Cabernet Franc and Linden Vineyards' examples are benchmarks.</p>\n<div class=\"wset-note\"><strong>WSET descriptor note:</strong> In WSET SAT language, Virginia Cabernet Franc is typically: colour — medium ruby/garnet; nose — medium to medium-plus intensity, red fruit (cherry, raspberry), dried herbs, floral (violet); palate — medium acidity, medium tannins, medium body, medium-plus finish.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Petit Verdot</h3><span class=\"tag\">Virginia Specialty</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>One of Virginia's most surprising success stories, Petit Verdot is rarely produced as a varietal wine in its homeland of Bordeaux — it is too late-ripening to reach full maturity most years in the Médoc. In Virginia's warm summers, however, it achieves remarkable ripeness and concentration. It has become one of the state's most distinctive and exciting variety.</p>\n<p><strong>Typical flavour profile:</strong> Deep purple-black colour; powerful aromas of blackberry, plum, dark chocolate, violets, leather, and black pepper. High tannins, full body, and deep colour make it unlike almost any other American varietal wine. Often described as having a \"Portuguese\" or \"Rhône\" character.</p>\n<p><strong>Key producers:</strong> Horton Vineyards (pioneers of Petit Verdot in Virginia), Barboursville Vineyards, King Family Vineyards.</p>\n<div class=\"callout\"><strong>Exam angle:</strong> Petit Verdot achieving full varietal expression in Virginia (rather than just as a blending component) is a key talking point for WSET Diploma discussions on how climate affects variety selection.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Merlot &amp; Cabernet Sauvignon</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p><strong>Merlot</strong> is grown throughout Virginia, particularly in the warmer, lower-elevation sites of the Piedmont and Northern Neck AVAs. It ripens before Cabernet Sauvignon and handles Virginia's humid, clay soils reasonably well. Style is typically soft, plummy, and approachable — medium body, red and black plum, mocha, and herb notes. Best in warm vintages; can be dilute or herbaceous in cool or wet years.</p>\n<p><strong>Cabernet Sauvignon</strong> is challenging in Virginia — its late-ripening nature means it regularly struggles to reach full phenolic maturity before autumn rains. It tends to produce wines with pronounced green pepper (pyrazine) characters unless planted on the warmest, best-drained slopes. It is more common as a blending component than as a varietal bottling. The warmest sites in Monticello and Middleburg produce the most convincing examples.</p>\n<div class=\"pill-grid\">\n<span class=\"pill red\">Merlot: plum, mocha, herb</span>\n<span class=\"pill red\">Cab Sauv: cassis, green pepper (cool yr)</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Norton (Cynthiana)</h3><span class=\"tag\">Native American variety</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Norton (also known as Cynthiana) is the most commercially significant native American red variety grown in Virginia and across the mid-Atlantic and Midwest. It is a hybrid of Vitis aestivalis origin (not Vitis vinifera), which makes it naturally resistant to phylloxera and to the fungal diseases that plague vinifera in Virginia's humid climate.</p>\n<p>Norton produces deeply coloured, tannic, and highly acidic wines. The flavour profile is unique: wild berries, concord grape, earthy/gamey notes, and a distinctive \"foxy\" quality that divides opinion. Chrysalis Vineyards in Middleburg Virginia is one of the most committed champions of Norton. Some producers use extended maceration and careful oak management to tame Norton's wild edges and produce genuinely compelling wines.</p>\n<div class=\"wset-note\"><strong>WSET distinction:</strong> Norton is Vitis aestivalis — not Vitis vinifera. This is a key technical distinction for exam purposes. Native American varieties and hybrids are increasingly discussed in WSET Diploma Unit 3 (Wines of the World).</div>\n</div></div>\n WHITE VARIETIES \n<div class=\"section-header\" style=\"margin-top:1.5rem;\">\n<div class=\"section-title\" style=\"font-size:17px;\">White Varieties</div>\n</div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Viognier</h3><span class=\"tag\">Flagship White</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Viognier is Virginia's most celebrated white grape variety and has been adopted as a kind of unofficial state variety. It was championed in the 1990s by Dennis Horton of Horton Vineyards, who recognised that its earlier ripening cycle and natural resistance to some fungal pressure made it well suited to Virginia conditions.</p>\n<p><strong>Typical flavour profile in Virginia:</strong> Peach, apricot, nectarine, white flowers (jasmine, honeysuckle), orange blossom, ginger, and white pepper. Virginia examples tend to be rich and full-bodied (13.5–15% alcohol) with low to medium acidity — the variety naturally produces low-acid wines. Oak is used judiciously; the best examples are fermented in neutral oak or concrete to preserve the floral and stone-fruit aromatics.</p>\n<p><strong>Winemaking notes:</strong> Viognier must be harvested at precise ripeness — too early and the wine lacks the characteristic aromatics; too late and it becomes flabby and over-alcoholic. Skin contact is sometimes used for a textural \"orange wine\" style. Barboursville's Viognier and RdV Vineyards' examples are frequently cited as benchmarks.</p>\n<div class=\"wset-note\"><strong>WSET note:</strong> Virginia Viognier is regularly compared to Condrieu in the Rhône Valley in WSET Diploma discussions. Key comparison: Virginia = warmer, lusher, less mineral; Condrieu = more restrained, higher natural acidity, terroir-driven.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Chardonnay</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Chardonnay is widely planted in Virginia and produces wines of considerable variation depending on site, vintage, and winemaking approach. In warmer years at lower elevations, Chardonnay can be rich and tropical — pineapple, mango, vanilla (from oak), and butter (from MLF). At higher elevations and in cooler vintages, a leaner, more Burgundian style emerges: green apple, citrus, mineral, and cream.</p>\n<p>Full MLF and new French oak are less fashionable among Virginia's top producers today; the trend is toward partial or no MLF and neutral oak or stainless steel, preserving freshness and site expression. Williamsburg Winery, Trump Winery (formerly Kluge Estate), and Linden Vineyards produce benchmark examples.</p>\n<div class=\"pill-grid\">\n<span class=\"pill white\">Apple · Pear · Citrus (cool sites)</span>\n<span class=\"pill white\">Mango · Vanilla · Butter (warm, oaked)</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Petit Manseng</h3><span class=\"tag\">Emerging Variety</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Petit Manseng is an Iberian/Gascon variety (native to the Jurançon region of southwestern France) that has found an unexpectedly successful home in Virginia. Its thick skins give natural resistance to rot, and it retains high natural acidity even at high sugar levels — making it ideal for both dry and late-harvest styles in Virginia's humid climate.</p>\n<p>In Virginia, Petit Manseng produces dry wines of real complexity: quince, tropical fruit (pineapple, mango), citrus blossom, ginger, and honeyed spice. Acidity is typically high to very high. Late-harvest versions can be superb dessert wines. Barboursville Vineyards and RdV Vineyards have both produced celebrated examples.</p>\n<div class=\"callout\"><strong>Why it matters:</strong> Petit Manseng is a prime example of Virginia producers seeking varieties specifically suited to their climate rather than planting \"famous\" varieties. This variety-selection philosophy is increasingly relevant at WSET Diploma level.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Riesling, Pinot Gris &amp; others</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"grape-grid\" style=\"margin-top:.3rem;\">\n<div class=\"grape-card w\"><h4>Riesling</h4><p>Best at high elevations (Rocky Knob, North Fork of Roanoke). Produces off-dry to dry styles with good acidity. Rarely reaches the mineral complexity of German or Alsatian examples.</p></div>\n<div class=\"grape-card w\"><h4>Pinot Gris</h4><p>Emerging variety in cooler sites. Produces light to medium-bodied whites with pear, citrus, and gentle spice. Still finding its identity in Virginia.</p></div>\n<div class=\"grape-card w\"><h4>Albariño</h4><p>The Spanish coastal variety has shown promise in Virginia's humid climate — its thick skins resist botrytis and it retains freshness. Experimental but increasingly planted.</p></div>\n<div class=\"grape-card w\"><h4>Traminette</h4><p>A Gewürztraminer hybrid developed at Cornell. Aromatic (rose petal, lychee, spice), disease-resistant, and cold-hardy. Popular in a sweeter style, especially for the tourist market.</p></div>\n</div>\n</div></div>\n"}, "climate": {"title": "4. Climate & Soils", "shortTitle": "Climate & Soils", "icon": "🌦️", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Climate &amp; Soils</div>\n<div class=\"section-sub\">The physical geography that defines Virginia wine — and the challenges it creates</div>\n</div>\n<div class=\"wset-note\">\n<strong>WSET core theme:</strong> Virginia's climate is the single most important factor shaping its wines — and the single biggest challenge its producers face. Understanding <em>why</em> the climate is difficult, and how producers manage it, is central to any WSET exam discussion of Virginia.\n  </div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Climate overview — Humid Continental</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia has a <strong>humid continental climate</strong> — characterised by hot, humid summers and cold winters with significant rainfall distributed throughout the year. This distinguishes it sharply from the semi-arid Mediterranean climates of California, Chile, or the Rhône Valley that many classic wine varieties were bred for.</p>\n<p>Key climate statistics for the Monticello AVA (a benchmark for Virginia viticulture):</p>\n<div class=\"data-row\"><span class=\"data-label\">Growing season (bud break to harvest)</span><span class=\"data-badge\">April – October</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Average summer temperature</span><span class=\"data-badge\">~27°C (80°F) avg</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Annual rainfall</span><span class=\"data-badge\">~1,000mm (40 in)</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Rainfall distribution</span><span class=\"data-badge\">Year-round (incl. harvest)</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Diurnal temperature variation</span><span class=\"data-badge\">12–18°C in growing season</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Average relative humidity (summer)</span><span class=\"data-badge\">65–80%</span></div>\n<div class=\"data-row\"><span class=\"data-label\">Hurricane/tropical storm risk</span><span class=\"data-badge\">Late August – October</span></div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>The humidity challenge — fungal disease management</h3><span class=\"tag\">Critical for exams</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>High summer humidity is the defining challenge of Virginia viticulture. Temperatures regularly exceed 30°C combined with 70–80% relative humidity, creating near-ideal conditions for:</p>\n<ul>\n<li><strong>Botrytis cinerea (grey rot)</strong> — particularly threatening during ripening if rain falls before harvest. Unlike in Sauternes, where noble rot is desirable, unwanted botrytis in Virginia destroys colour, flavour, and structure.</li>\n<li><strong>Downy mildew (Plasmopara viticola)</strong> — a water mould that attacks leaves and berries in warm, wet conditions. Requires regular fungicide applications (organic sulfur and copper in certified organic operations).</li>\n<li><strong>Powdery mildew (Erysiphe necator)</strong> — favoured by warm days and cool nights; can devastate unprotected vines.</li>\n<li><strong>Pierce's Disease</strong> — a bacterial disease spread by the glassy-winged sharpshooter leafhopper. Particularly devastating in the warmer, lower-elevation coastal areas. Incurable; kills vines within 1–5 years. It was the primary reason Thomas Jefferson's 18th-century vineyard experiments failed.</li>\n</ul>\n<div class=\"callout\"><strong>Management strategies:</strong> Canopy management (vertical shoot positioning, leaf pulling, high vine training) is paramount for air circulation. Many Virginia producers have adopted high-density, narrow-spaced rows with intensive canopy management borrowed from Burgundy and Germany. Cover crops, careful spray programmes, and harvest timing are equally critical.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>The Blue Ridge Mountain effect</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>The Blue Ridge Mountains, running northeast to southwest through the western half of Virginia, are the single most important geographical feature shaping Virginia viticulture. Most of the state's finest vineyards are located in the Piedmont foothills on the eastern side of the Blue Ridge, at elevations between 400 and 1,400 feet.</p>\n<p>The mountains provide several viticultural benefits:</p>\n<ul>\n<li><strong>Elevation:</strong> Higher sites are cooler, reducing disease pressure and preserving natural grape acidity.</li>\n<li><strong>Air drainage:</strong> Cold air flows downhill, meaning valley floors suffer more frost events than mid-slope sites. The best vineyards are located on the middle slopes — above the frost pocket but below the cold, exposed summit.</li>\n<li><strong>Afternoon shade:</strong> West-facing slopes receive some afternoon cloud cover from the mountains, moderating extreme summer heat and slowing over-ripening.</li>\n<li><strong>Rain shadow:</strong> The Shenandoah Valley, protected by the Blue Ridge to the east and the Allegheny Mountains to the west, receives significantly less rainfall than the Piedmont — a critical advantage in disease management.</li>\n</ul>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Soils of Virginia</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia's soils are geologically diverse, reflecting hundreds of millions of years of tectonic activity, volcanic intrusions, and erosion. The most important soil types for viticulture include:</p>\n<div class=\"two-col\">\n<div>\n<p><strong>Piedmont Red Clay Loams</strong><br/><span style=\"font-size:12px;color:var(--ink-muted);\">Dominant in Monticello and Middleburg AVAs. Heavy clay content retains water — can cause waterlogging in wet years. Growers plant on slopes with natural drainage. Rich in iron oxides (giving the characteristic red colour). Can produce full-bodied, structured reds.</span></p>\n</div>\n<div>\n<p><strong>Granite / Metamorphic Bedrock</strong><br/><span style=\"font-size:12px;color:var(--ink-muted);\">Underlies much of the Blue Ridge foothills. Thin, rocky soils derived from this bedrock stress the vines (low vigour), producing wines of concentration and mineral character. Well-drained and root-penetrating.</span></p>\n</div>\n<div>\n<p><strong>Limestone &amp; Shale</strong><br/><span style=\"font-size:12px;color:var(--ink-muted);\">Found in the Shenandoah Valley, derived from ancient marine sediment. Gives well-drained, calcium-rich soils that promote vigour control and aromatic intensity. Some producers compare the character to limestone-influenced Burgundy.</span></p>\n</div>\n<div>\n<p><strong>Sandy Loams</strong><br/><span style=\"font-size:12px;color:var(--ink-muted);\">Predominate in the coastal AVAs (Northern Neck, Eastern Shore). Very well-draining, low water retention, warms up quickly in spring. Favours earlier bud break and lighter-bodied wine styles.</span></p>\n</div>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Growing season and harvest timing</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia's growing season typically begins with bud break in late March to mid-April. The critical risk window is spring frost (April–May), which can devastate early-budding varieties. Flowering occurs in May–June, and veraison (colour change / sugar accumulation) begins in late July to August.</p>\n<p>Harvest typically runs from late August (for early-ripening varieties such as Viognier) through October (for Cabernet Sauvignon in warmer years). The late summer / early autumn period is the most fraught — Atlantic tropical storms and hurricanes can bring sudden intense rainfall from late August through October, causing dilution, botrytis, and in severe cases, catastrophic crop loss.</p>\n<p>This harvest timing challenge drives two key management decisions: (1) choosing earlier-ripening varieties (Cab Franc over Cab Sauv; Viognier over Riesling at lower elevations), and (2) selective / rapid harvest at precise ripeness to beat incoming weather systems.</p>\n</div></div>\n"}, "making": {"title": "5. Winemaking in Virginia", "shortTitle": "Winemaking in Virginia", "icon": "⚙️", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Winemaking in Virginia</div>\n<div class=\"section-sub\">From vineyard to bottle — techniques, philosophy, and WSET-relevant production details</div>\n</div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Viticulture — canopy management and disease control</h3><span class=\"tag\">Most Critical Factor</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>In Virginia, viticulture is more important than winemaking in determining quality. The best producers manage their vineyards with a level of intensity comparable to top Burgundy estates:</p>\n<ul>\n<li><strong>Vertical Shoot Positioning (VSP):</strong> Training vines vertically with shoots tied to wires maximises air circulation through the canopy, reducing the humidity that encourages fungal disease. Standard across most premium Virginia estates.</li>\n<li><strong>Leaf pulling (summer hedging):</strong> Removing leaves from the fruit zone improves sunlight and air flow, reduces disease pressure, and improves colour development in red varieties.</li>\n<li><strong>High-density planting:</strong> Some premium producers (notably RdV Vineyards, which was built with advice from Stéphane Derenoncourt of Bordeaux) plant at 4,000–5,000 vines/hectare — far more than was typical in Virginia's history — to stress vines and improve fruit concentration.</li>\n<li><strong>Green harvest (crop thinning):</strong> Dropping fruit in summer to reduce yield per vine improves the concentration and ripeness of the remaining clusters. Critical in problem years.</li>\n<li><strong>Cover crops:</strong> Used for soil health, erosion prevention on slopes, and managing vine vigour (competitive cover crops limit vine nutrition). Clover, native grasses, and fescue are common.</li>\n</ul>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Red winemaking techniques</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p><strong>Fermentation:</strong> Temperature-controlled stainless steel is standard for primary fermentation. Pump-overs and punch-downs are used to extract colour, flavour, and tannin from the skins. Extraction is typically moderate — Virginia producers learned that over-extraction in difficult vintages creates harsh, bitter wines.</p>\n<p><strong>Maturation:</strong> French oak barrels (225L barriques) dominate at the premium level, with typically 30–70% new oak for flagship wines. American oak is less common but occasionally used for Cabernet Franc. Aging is typically 12–18 months. Larger format oak (500L puncheons, 228L Burgundy barrels) is increasingly used to impart oak complexity with less direct oak flavour — suited to Virginia's lighter-bodied red style.</p>\n<p><strong>Blending:</strong> Bordeaux-style blending is the norm for premium reds — Cabernet Franc with Merlot and/or Petit Verdot (and occasionally small amounts of Cabernet Sauvignon or Malbec). This blending philosophy allows vintages with challenges in any single variety to still produce balanced, complex wines.</p>\n<div class=\"wset-note\"><strong>RdV Vineyards note:</strong> RdV (short for \"Rendezvous\") is widely regarded as Virginia's most ambitious project — a Bordeaux-inspired estate planted at Grand Cru densities with rigorous selection. Its \"Rendezvous\" and \"Lost Mountain\" bottlings are among Virginia's most sought-after wines and demonstrate the pinnacle of the Bordeaux blending approach in Virginia.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>White winemaking techniques</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p><strong>Viognier:</strong> Whole cluster pressing is common to preserve delicate aromatics. Fermentation typically takes place in stainless steel or neutral French oak to retain the variety's characteristic peachy, floral character. Full or partial MLF is winemaker-dependent — those seeking freshness skip it, those wanting texture and complexity use it partially. The trend is toward less oak influence.</p>\n<p><strong>Chardonnay:</strong> Both oaked (Burgundian) and unoaked (Chablis-inspired) styles are produced. Top producers use barrel fermentation in French oak with regular bâtonnage (lees stirring) to add texture. MLF is common for richness and complexity. Extended lees aging (sur lie, 6–12 months) is increasingly popular.</p>\n<p><strong>Petit Manseng:</strong> For dry styles, early harvest preserves acidity and freshness. For dessert versions, late harvest with natural concentration (passerillage — on-vine drying, similar to Jurançon Moelleux) produces rich, complex sweet wines with retained freshness due to the variety's naturally high acidity.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Sparkling wine production</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia produces sparkling wines using both the traditional method (Méthode Champenoise / Méthode Traditionnelle) and the Charmat method (tank fermentation). Chardonnay, Pinot Noir, and Viognier are used for sparkling production. The high natural acidity of grapes harvested slightly early makes Virginia well-suited to sparkling wine production.</p>\n<p>Thibaut-Janisson Winery (a collaboration between Virginia winemaker Claude Thibaut and French vigneron Manuel Janisson from Champagne) produces highly regarded traditional-method sparkling wines and has helped elevate the category's profile. The \"Blanc de Chardonnay\" is a notable benchmark.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Natural wine &amp; organic/biodynamic viticulture</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia's humid climate makes certified organic viticulture extraordinarily challenging — the fungal disease pressure almost always requires some intervention with copper and sulfur sprays. However, a small but growing number of producers minimise inputs and work toward sustainable or quasi-organic farming, including Linden Vineyards, Ankida Ridge (Virginia's highest-elevation producer, certified organic), and several smaller estates.</p>\n<p>The \"natural wine\" movement — which has little official regulation but implies minimal intervention, native fermentation, and no added sulphites — has a small but vocal presence in Virginia. The tension between terroir expression and the practical necessity of disease management in a humid climate makes this an active debate in the Virginia wine community.</p>\n</div></div>\n"}, "tasting": {"title": "6. WSET Systematic Approach to Tasting (SAT)", "shortTitle": "WSET Systematic Approach to Tasting (SAT)", "icon": "👃", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">WSET Systematic Approach to Tasting (SAT)</div>\n<div class=\"section-sub\">Applying the WSET SAT to Virginia's key wines — typical descriptors and quality signals</div>\n</div>\n<div class=\"wset-note\">\n<strong>WSET SAT reminder:</strong> The WSET Systematic Approach to Tasting structures wine assessment under <strong>Appearance → Nose → Palate → Conclusions</strong>. For WSET Level 3 and Diploma, you must use the correct WSET descriptor vocabulary — not casual language. The examples below use SAT-appropriate language for Virginia's flagship wines.\n  </div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia Viognier — SAT tasting note</h3><span class=\"tag\">White, dry</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"step\"><div class=\"step-num\">A</div><div class=\"step-content\"><h4>Appearance</h4><p>Pale to medium gold. Clear. Still. In older examples or those with extended skin contact, may show a deeper golden or amber tint.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">N</div><div class=\"step-content\"><h4>Nose</h4><p><strong>Clean.</strong> Medium-plus to pronounced intensity. Primary aromas dominate: peach, apricot, nectarine, dried apricot (in riper vintages), white flowers (jasmine, honeysuckle), orange blossom, ginger, and white pepper. May show subtle toasty or vanilla notes if fermented in oak. No obvious faults.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">P</div><div class=\"step-content\"><h4>Palate</h4><p>Dry. Low to medium acidity (Viognier's natural acidity is a weakness — distinguishing feature). No tannin. Medium to full body. Medium to high alcohol (13.5–15%). Medium to medium-plus flavour intensity. Flavours mirror the nose: stone fruit, floral, spice. Medium to long finish.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">C</div><div class=\"step-content\"><h4>Conclusions</h4><p>Quality: Good to very good (occasionally outstanding in benchmark years). Readiness: Ready to drink; limited ageing potential (1–3 years for most). The low acidity limits long-term development compared to Chardonnay or Riesling.</p></div></div>\n<div class=\"callout\"><strong>Distinguishing Virginia Viognier from Condrieu (Rhône):</strong> Virginia = more tropical fruit, higher alcohol, lower acidity, softer structure. Condrieu = more refined floral (white peach, violet), higher mineral tension, better age-worthiness.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia Cabernet Franc — SAT tasting note</h3><span class=\"tag\">Red, dry</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"step\"><div class=\"step-num\">A</div><div class=\"step-content\"><h4>Appearance</h4><p>Medium ruby to garnet, with a slightly translucent rim. Depth varies by vintage and oak influence. Good colour saturation in warm years.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">N</div><div class=\"step-content\"><h4>Nose</h4><p>Clean. Medium to medium-plus intensity. Red fruits dominant: cherry, raspberry, red plum. Secondary: dried herbs (tarragon, thyme — a key Cab Franc marker), violet, graphite, and tobacco. Oak-aged examples add cedar, vanilla, and toast. In less ripe vintages: pronounced green bell pepper (pyrazine character) — a marker of insufficient phenolic ripeness.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">P</div><div class=\"step-content\"><h4>Palate</h4><p>Dry. Medium to medium-plus acidity. Medium tannins (finer-grained than Cabernet Sauvignon; more assertive than Pinot Noir). Medium body. Medium alcohol (12.5–14%). Flavour reflects nose. Medium to long finish in premium examples.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">C</div><div class=\"step-content\"><h4>Conclusions</h4><p>Quality: Good to outstanding. Readiness: approachable on release; premium examples benefit from 3–8 years cellaring. The best (Barboursville Reserve, Linden Hardscrabble) can age 10–15 years.</p></div></div>\n<div class=\"callout\"><strong>Virginia Cab Franc vs. Loire Valley (Chinon/Bourgueil):</strong> Virginia = warmer, riper, more black fruit, less earthy minerality, more oak-influenced. Loire = more herbaceous, more mineral (limestone tuffeau), lighter body, higher acid.</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia Petit Verdot — SAT tasting note</h3><span class=\"tag\">Red, dry</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"step\"><div class=\"step-num\">A</div><div class=\"step-content\"><h4>Appearance</h4><p>Deep ruby-purple, virtually opaque. High colour intensity — deeper than almost any other Virginia red. May stain the glass.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">N</div><div class=\"step-content\"><h4>Nose</h4><p>Clean. Medium-plus to pronounced intensity. Black fruits dominate: blackberry, black plum, cassis. Secondary: dark chocolate, violet, leather, black pepper, and graphite. Oak-aged: cedar, mocha, tobacco. Unique — no other Virginia wine smells quite like this.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">P</div><div class=\"step-content\"><h4>Palate</h4><p>Dry. Medium acidity. High tannins — grippy, structured, drying. Full body. High alcohol (13.5–15%). Pronounced flavour intensity. Long finish — sometimes austere when young.</p></div></div>\n<div class=\"step\"><div class=\"step-num\">C</div><div class=\"step-content\"><h4>Conclusions</h4><p>Quality: Good to very good. Readiness: Requires ageing — 5+ years minimum for premium examples; 10–20 years at its best. Not for early drinking.</p></div></div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Identifying vintage quality signals in Virginia</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>In WSET SAT conclusions, \"readiness for drinking\" and \"quality\" must be assessed. Virginia wines give specific signals:</p>\n<ul>\n<li><strong>Positive signals (warm, dry vintage):</strong> Deep colour, clean fresh fruit, minimal herbaceous (green pepper) character in reds, good phenolic ripeness (round tannins), bright but not harsh acidity.</li>\n<li><strong>Challenging vintage signals:</strong> Dilute colour, green/unripe aromas (pyrazine in reds), high acidity without corresponding fruit weight, short finish, botrytis character (mushroom, brett-like aromas).</li>\n<li><strong>Over-ripe vintage signals:</strong> Jammy or cooked fruit aromas, very high alcohol, low acidity and flat structure, absence of fine herbal complexity.</li>\n</ul>\n</div></div>\n"}, "food": {"title": "7. Food & Wine Pairing", "shortTitle": "Food & Wine Pairing", "icon": "🍽️", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Food &amp; Wine Pairing</div>\n<div class=\"section-sub\">Virginia wines at the table — regional cuisine and classic pairing principles</div>\n</div>\n<div class=\"callout\">\n<strong>WSET pairing principle:</strong> Match weight with weight; use acidity and tannin to cut richness; complement or contrast aromatic profiles. Virginia's wines — particularly the aromatic whites and herbal reds — pair exceptionally well with the state's own culinary traditions (Chesapeake Bay seafood, smoked meats, Southern farmhouse cuisine).\n  </div>\n<div class=\"food-grid\">\n<div class=\"food-cell\"><div class=\"wine-name\">Viognier (dry)</div><div class=\"food-name\">Chesapeake Bay blue crab cakes · Spicy Thai cuisine · Roasted chicken with herbs · Mild soft-ripened cheese</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Chardonnay (oaked)</div><div class=\"food-name\">Lobster bisque · Roast pork loin · Creamy pasta dishes · Gruyère or Comté</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Chardonnay (unoaked)</div><div class=\"food-name\">Oysters (Virginia Rappahannock River oysters) · Steamed clams · Grilled halibut · Fresh goat cheese</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Petit Manseng (dry)</div><div class=\"food-name\">Spicy Vietnamese pho · Sichuan dishes · Pan-seared scallops · Aged gouda</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Cabernet Franc</div><div class=\"food-name\">Virginia country ham · Rack of lamb · Duck breast with cherry sauce · Aged cheddar</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Petit Verdot</div><div class=\"food-name\">Grilled beef ribeye · Venison stew · Aged hard cheeses (Parmigiano) · Dark chocolate</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Merlot blend</div><div class=\"food-name\">Braised short ribs · Mushroom risotto · Pork tenderloin · Mild blue cheese</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Norton</div><div class=\"food-name\">Barbecued brisket · Smoked pulled pork · Game meats (venison, wild boar) · Sharp cheddar</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Sparkling (Blanc de Blancs)</div><div class=\"food-name\">Virginia oysters · Chesapeake steamed shrimp · Fried chicken · Light canapés</div></div>\n<div class=\"food-cell\"><div class=\"wine-name\">Petit Manseng (late harvest)</div><div class=\"food-name\">Peach tarte tatin · Blue cheese (Roquefort) · Foie gras · Crème brûlée</div></div>\n</div>\n<div class=\"card\" style=\"margin-top:1rem;\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Virginia's regional cuisine context</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Virginia has a rich culinary tradition rooted in its agricultural heritage, indigenous foodways, and Chesapeake Bay seafood culture. Key regional pairings leverage this local identity:</p>\n<ul>\n<li><strong>Chesapeake Bay oysters and seafood:</strong> Virginia's Rappahannock and Chesapeake oysters are world-class. Their briny, clean flavour pairs perfectly with unoaked Chardonnay, dry Viognier, or traditional-method sparkling wine — the high acidity acts as a \"squeeze of lemon,\" cutting through the oyster's richness.</li>\n<li><strong>Virginia country ham:</strong> Salt-cured and sometimes smoked, Virginia country ham (a cousin of Prosciutto or Jamon Serrano) pairs classically with Cabernet Franc — the wine's herbal quality complements the cured pork while its acidity cuts the fat and salt.</li>\n<li><strong>Smoked and barbecued meats:</strong> The bold tannins and dark fruit of Petit Verdot and Norton stand up to the intensity of wood-smoked brisket, pulled pork, or venison — a uniquely American pairing.</li>\n</ul>\n</div></div>\n"}, "vintages": {"title": "8. Notable Vintages", "shortTitle": "Notable Vintages", "icon": "📆", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Notable Vintages</div>\n<div class=\"section-sub\">Virginia harvest assessments — warm/dry vintages produce the finest wines</div>\n</div>\n<div class=\"callout\">\n<strong>Vintage variation in Virginia</strong> is significantly greater than in California or other Mediterranean-climate regions. Hot, dry summers produce wines of real depth and structure; wet, cool summers lead to dilution, herbaceousness, and fungal challenges. The best advice for WSET study: understand <em>why</em> Virginia is vintage-variable, not just which years were good.\n  </div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Vintage assessments 2010–2023</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"vintage-grid\">\n<div class=\"v-cell exc\"><div class=\"v-year\">2023</div><div class=\"v-rating\">★★★★</div></div>\n<div class=\"v-cell good\"><div class=\"v-year\">2022</div><div class=\"v-rating\">★★★½</div></div>\n<div class=\"v-cell exc\"><div class=\"v-year\">2021</div><div class=\"v-rating\">★★★★★</div></div>\n<div class=\"v-cell chal\"><div class=\"v-year\">2020</div><div class=\"v-rating\">★★½</div></div>\n<div class=\"v-cell exc\"><div class=\"v-year\">2019</div><div class=\"v-rating\">★★★★</div></div>\n<div class=\"v-cell good\"><div class=\"v-year\">2018</div><div class=\"v-rating\">★★★</div></div>\n<div class=\"v-cell avg\"><div class=\"v-year\">2017</div><div class=\"v-rating\">★★½</div></div>\n<div class=\"v-cell exc\"><div class=\"v-year\">2016</div><div class=\"v-rating\">★★★★½</div></div>\n<div class=\"v-cell avg\"><div class=\"v-year\">2015</div><div class=\"v-rating\">★★★</div></div>\n<div class=\"v-cell exc\"><div class=\"v-year\">2014</div><div class=\"v-rating\">★★★★</div></div>\n<div class=\"v-cell chal\"><div class=\"v-year\">2013</div><div class=\"v-rating\">★★</div></div>\n<div class=\"v-cell good\"><div class=\"v-year\">2012</div><div class=\"v-rating\">★★★</div></div>\n<div class=\"v-cell exc\"><div class=\"v-year\">2011</div><div class=\"v-rating\">★★★★</div></div>\n<div class=\"v-cell chal\"><div class=\"v-year\">2010</div><div class=\"v-rating\">★★½</div></div>\n</div>\n<div class=\"pill-grid\" style=\"margin-top:.8rem;\">\n<span class=\"pill style\">★★★★★ Exceptional</span>\n<span class=\"pill white\">★★★★ Excellent</span>\n<span class=\"pill grape\">★★★ Good</span>\n<span class=\"pill red\">★★ Challenging</span>\n</div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>2021 — Exceptional ★★★★★</h3><span class=\"tag\">Benchmark vintage</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>2021 is widely regarded as one of Virginia's finest vintages in the modern era. A warm, dry spring enabled even bud break with minimal frost damage. The summer was hot and dry — unusually so — with below-average rainfall from June through August providing near-ideal conditions for ripening without fungal pressure. A dry September allowed growers to be patient in harvest decisions.</p>\n<p>Results: Reds of exceptional depth, concentration, and structure — particularly Cabernet Franc (deep fruit, fine tannins, excellent structure for aging) and Petit Verdot (extraordinary colour, power, and complexity). Whites were rich and aromatic with good balancing acidity. The vintage is considered particularly good for aging. It is the kind of year that demonstrates what Virginia can do at its very best.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>2016 — Excellent ★★★★½</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>Another standout vintage, with a warm, relatively dry growing season. Some rain in September required careful harvest timing, but producers who waited and harvested selectively produced exceptional wines. Cabernet Franc was the star variety — elegantly structured, with real aromatic complexity. Viognier showed wonderful floral purity. A generally reliable year across the board.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>2020 — Challenging ★★½</h3><span class=\"tag\">Difficult year</span><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>2020 presented significant challenges. A wet summer with high humidity elevated fungal disease pressure throughout the growing season, requiring intensive vineyard management. Tropical Storm Isaias brought heavy rainfall in early August — precisely when the grapes were beginning the critical phase of ripening. Many vineyards experienced significant botrytis infection in the aftermath.</p>\n<p>Wines from 2020 are typically lighter-bodied, with lower tannins and some herbaceous character in reds. White wines fared somewhat better — Viognier and Petit Manseng showed reasonable fruit character. Producers with rigorous canopy management and the flexibility to harvest at different times (selective picking) produced surprisingly decent wines; others struggled considerably.</p>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>What makes a great Virginia vintage?</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<p>For WSET exam purposes, understand the key factors that determine vintage quality in Virginia:</p>\n<ul>\n<li><strong>Dry summer (June–August):</strong> Low rainfall reduces fungal disease pressure and concentrates flavours in the grapes.</li>\n<li><strong>Warm growing season:</strong> Heat accumulation (measured in degree days) enables full phenolic ripeness — critical for Cabernet Franc and Petit Verdot.</li>\n<li><strong>No late-season tropical events:</strong> The absence of Atlantic hurricanes or tropical storms in August–October is the single biggest determinant of harvest quality.</li>\n<li><strong>Mild spring (low frost risk):</strong> Late frosts after bud break can destroy the primary buds, forcing secondary growth and reducing yield and quality.</li>\n</ul>\n</div></div>\n"}, "terms": {"title": "9. Key Terms & Concepts", "shortTitle": "Key Terms & Concepts", "icon": "📖", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Key Terms &amp; Concepts</div>\n<div class=\"section-sub\">Essential vocabulary for Virginia wines — WSET exam-ready definitions</div>\n</div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Appellation &amp; legal terms</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"term-row\"><span class=\"term\">AVA</span><span class=\"def\">American Viticultural Area — a geographically defined wine grape growing region recognised by the Alcohol and Tobacco Tax and Trade Bureau (TTB). AVAs define geography only, not permitted varieties, yields, or winemaking practices. 85% of grapes must come from the named AVA for it to appear on the label.</span></div>\n<div class=\"term-row\"><span class=\"term\">TTB</span><span class=\"def\">Alcohol and Tobacco Tax and Trade Bureau — the US federal agency that administers AVA designations, wine labelling regulations, and permits. The equivalent of the EU's appellation-governing bodies for US wine law.</span></div>\n<div class=\"term-row\"><span class=\"term\">Farm Winery Act</span><span class=\"def\">Virginia law (first passed 1980, subsequently updated) that allows farm wineries to sell wine directly to consumers on-site. Critical to the growth of Virginia's wine tourism industry and the viability of small family estates.</span></div>\n<div class=\"term-row\"><span class=\"term\">Varietal labelling</span><span class=\"def\">In the USA, at least 75% of the wine must be made from the named grape variety for it to be labelled as that variety (e.g., \"Virginia Viognier\"). This differs from the EU's minimums, which vary by appellation.</span></div>\n<div class=\"term-row\"><span class=\"term\">Estate bottled</span><span class=\"def\">A US legal term indicating the winery grew, crushed, fermented, and bottled 100% of the grapes at a single winery location — all within the same AVA. A stricter standard than generic \"estate\" claims.</span></div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Climate &amp; viticulture terms</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"term-row\"><span class=\"term\">Humid Continental</span><span class=\"def\">A climate type characterised by hot, humid summers and cold winters with precipitation distributed year-round — in contrast to a Mediterranean climate's dry summers. Virginia, Germany, and parts of Burgundy experience this climate type, which requires active disease management in the vineyard.</span></div>\n<div class=\"term-row\"><span class=\"term\">Pierce's Disease</span><span class=\"def\">A bacterial disease (Xylella fastidiosa) fatal to Vitis vinifera. Spread by the glassy-winged sharpshooter leafhopper. Historically devastated Virginia's early vineyards (including Thomas Jefferson's). Most severe at lower elevations below 300 metres. Higher elevation planting largely avoids the insect vector. No cure exists once a vine is infected.</span></div>\n<div class=\"term-row\"><span class=\"term\">Botrytis cinerea</span><span class=\"def\">A fungal mould (\"grey rot\" or, in its desired form, \"noble rot\") that attacks grape clusters during humid conditions. In Virginia, it is almost always grey rot (undesirable) — causing loss of colour, flavour, and structure. Distinguished from the noble rot (Botrytis) that produces Sauternes by the conditions under which it strikes: continuous wet/humid weather vs. alternating wet mornings and dry afternoons.</span></div>\n<div class=\"term-row\"><span class=\"term\">Diurnal temperature variation</span><span class=\"def\">The difference between daytime high and night-time low temperatures. Large diurnal shifts in Virginia's mountain regions allow warm-day ripening while cool nights preserve natural grape acidity and aromatic compounds. This thermal variation is a key quality factor, particularly for white wines and elegant reds.</span></div>\n<div class=\"term-row\"><span class=\"term\">VSP (Vertical Shoot Positioning)</span><span class=\"def\">A training and trellising system in which the vine's shoots are trained vertically and secured to wires. Maximises canopy exposure and air circulation — critical in Virginia's humid climate to reduce fungal disease. The dominant system in premium Virginia vineyards.</span></div>\n<div class=\"term-row\"><span class=\"term\">Cold air drainage</span><span class=\"def\">The natural movement of cold air downhill at night. In Virginia's Blue Ridge foothills, cold air drains into valley floors — making them frost-prone. Mid-slope vineyard sites above the valley floor avoid these frost pockets, reducing the risk of spring frost damage after bud break.</span></div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Grape variety terms</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"term-row\"><span class=\"term\">Vitis vinifera</span><span class=\"def\">The European grape species from which virtually all classic wine varieties are derived — Cabernet Sauvignon, Chardonnay, Viognier, etc. Vinifera is susceptible to phylloxera and most fungal diseases, requiring grafting onto American rootstocks and fungicide management in humid climates like Virginia.</span></div>\n<div class=\"term-row\"><span class=\"term\">Vitis aestivalis</span><span class=\"def\">A native American grape species from which Norton (Cynthiana) is derived. Naturally resistant to phylloxera and many fungal diseases. Produces wines with higher acidity, more astringent tannins, and a distinctive \"wild\" character compared to vinifera. Important for Virginia's wine heritage.</span></div>\n<div class=\"term-row\"><span class=\"term\">Hybrid variety</span><span class=\"def\">A cross between Vitis vinifera and one or more American Vitis species (labrusca, aestivalis, rupestris). Hybrids — such as Traminette, Chambourcin, Seyval Blanc, and Vidal Blanc — combine some vinifera wine quality with American species' disease resistance and cold hardiness. Important in Virginia for the tourist and entry-level wine market.</span></div>\n<div class=\"term-row\"><span class=\"term\">Pyrazines</span><span class=\"def\">Aromatic compounds (specifically methoxypyrazines) responsible for the green bell pepper, asparagus, or grassy character found in under-ripe Cabernet Sauvignon, Cabernet Franc, and Sauvignon Blanc. In Virginia, elevated pyrazines in reds signal an under-ripe vintage or poorly sited vineyard. A small amount in Cabernet Franc is considered typical (herbaceous complexity); a large amount indicates a problem.</span></div>\n<div class=\"term-row\"><span class=\"term\">Passerillage</span><span class=\"def\">The technique of leaving grapes on the vine (or harvested bunches on mats) to dehydrate and concentrate sugars and flavours. Used in Virginia for late-harvest Petit Manseng to produce complex, naturally sweet dessert wines with retained freshness — analogous to Jurançon Moelleux in France.</span></div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Winemaking terms</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"term-row\"><span class=\"term\">MLF (Malolactic Fermentation)</span><span class=\"def\">A bacterial conversion of sharp malic acid to softer lactic acid. Reduces perceived acidity and adds buttery, creamy, diacetyl character. Standard for red wines; used selectively for white wines (often partial). In Virginia, MLF must be carefully managed — the state's low-acid Viognier can become flat and flabby if fully MLF'd.</span></div>\n<div class=\"term-row\"><span class=\"term\">Bâtonnage</span><span class=\"def\">Lees stirring — agitating the wine in barrel to keep the yeast lees suspended and in contact with the wine. Adds richness, texture, and complexity (toasty, biscuity, creamy notes) to white wines. Common in premium Virginia Chardonnay production. Borrowed from Burgundy.</span></div>\n<div class=\"term-row\"><span class=\"term\">Green harvest</span><span class=\"def\">The deliberate removal of grape clusters before ripening (typically July) to reduce yield and improve the concentration and quality of the remaining fruit. Critical in problem years and for premium estate production. Reduces quantity but improves quality.</span></div>\n<div class=\"term-row\"><span class=\"term\">Pump-over / Punch-down</span><span class=\"def\">Two techniques for managing the \"cap\" of grape skins during red wine fermentation. Pumping over draws wine from the bottom of the tank and sprays it over the cap; punching down physically submerges the cap. Both techniques extract colour, tannin, and flavour from the skins. Pump-overs extract more gently; punch-downs are more intensive.</span></div>\n</div></div>\n<div class=\"card\"><div class=\"card-head\" onclick=\"tog(this)\"><h3>Key Virginia producers to know</h3><span class=\"chevron\">▶</span></div><div class=\"card-body\">\n<div class=\"term-row\"><span class=\"term\">Barboursville Vineyards</span><span class=\"def\">Established 1976 by the Italian Zonin family near Charlottesville; the watershed moment for Virginia's modern fine wine identity. Known for exceptional Viognier, Cabernet Franc, and Octagon (their Bordeaux blend). One of Virginia's most internationally known labels.</span></div>\n<div class=\"term-row\"><span class=\"term\">RdV Vineyards</span><span class=\"def\">Virginia's most ambitious Bordeaux-inspired project. Planted at Burgundy-level density with advice from Stéphane Derenoncourt. Their \"Rendezvous\" and \"Lost Mountain\" bottlings are frequently listed among Virginia's finest. A benchmark for what Virginia red wine can be.</span></div>\n<div class=\"term-row\"><span class=\"term\">Linden Vineyards</span><span class=\"def\">Founded by Jim Law — widely considered one of Virginia's most technically accomplished winemakers. Located in the Blue Ridge foothills. Known for single-vineyard Chardonnay, Cabernet Franc (Hardscrabble), and elegant terroir-driven wines. A model of understated European winemaking in Virginia.</span></div>\n<div class=\"term-row\"><span class=\"term\">Horton Vineyards</span><span class=\"def\">Pioneer of Viognier in Virginia (early 1990s) and champion of Petit Verdot, Norton, and other alternative varieties. Dennis Horton's experimental philosophy helped define Virginia's variety-selection ethos.</span></div>\n<div class=\"term-row\"><span class=\"term\">King Family Vineyards</span><span class=\"def\">Monticello AVA estate known for Meritage (Bordeaux-style blend), Viognier, and the unusual Crozet Blue (Merlot-dominant). Popular winery with strong tasting room presence in the Charlottesville region.</span></div>\n<div class=\"term-row\"><span class=\"term\">Thibaut-Janisson</span><span class=\"def\">Virginia's benchmark traditional-method sparkling wine producer. Collaboration between Virginian Claude Thibaut and French Champagne vigneron Manuel Janisson. Blanc de Chardonnay is the flagship and has achieved national recognition.</span></div>\n</div></div>\n"}, "quiz": {"title": "10. Test your knowledge", "shortTitle": "Test your knowledge", "icon": "🧠", "html": "\n<div class=\"section-header\">\n<div class=\"section-title\">Test your knowledge</div>\n<div class=\"section-sub\">Virginia wines — 15 WSET-level questions</div>\n</div>\n<div class=\"score-bar\">\n<div><div class=\"score-label\">Score</div><div class=\"score-num\" id=\"scoreDisp\">0 / 15</div></div>\n<button class=\"restart-btn\" onclick=\"resetQuiz()\">↺ Restart</button>\n</div>\n<div id=\"quizWrap\"><div class=\"quiz-q\"><div class=\"q-text\">1. Which grape variety is widely regarded as Virginia's flagship red, chosen partly because it ripens 2–3 weeks earlier than Cabernet Sauvignon?</div><button class=\"opt\" onclick=\"answer(this,0,0)\">Merlot</button><button class=\"opt\" onclick=\"answer(this,0,1)\">Petit Verdot</button><button class=\"opt\" onclick=\"answer(this,0,2)\">Cabernet Franc</button><button class=\"opt\" onclick=\"answer(this,0,3)\">Norton</button><div class=\"feedback\" id=\"fb0\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">2. What is the primary climate type that defines Virginia's wine regions and creates the state's biggest viticulture challenges?</div><button class=\"opt\" onclick=\"answer(this,1,0)\">Mediterranean</button><button class=\"opt\" onclick=\"answer(this,1,1)\">Maritime Oceanic</button><button class=\"opt\" onclick=\"answer(this,1,2)\">Humid Continental</button><button class=\"opt\" onclick=\"answer(this,1,3)\">Semi-Arid Continental</button><div class=\"feedback\" id=\"fb1\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">3. Which fatal bacterial disease — historically the cause of Thomas Jefferson's failed vineyard experiments — is spread by a leafhopper insect and kills Vitis vinifera vines?</div><button class=\"opt\" onclick=\"answer(this,2,0)\">Botrytis cinerea</button><button class=\"opt\" onclick=\"answer(this,2,1)\">Downy mildew</button><button class=\"opt\" onclick=\"answer(this,2,2)\">Pierce's Disease</button><button class=\"opt\" onclick=\"answer(this,2,3)\">Phylloxera vastatrix</button><div class=\"feedback\" id=\"fb2\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">4. Which French winemaking region was most instrumental in shaping Barboursville Vineyards and Virginia's modern fine wine identity?</div><button class=\"opt\" onclick=\"answer(this,3,0)\">Burgundy</button><button class=\"opt\" onclick=\"answer(this,3,1)\">Bordeaux</button><button class=\"opt\" onclick=\"answer(this,3,2)\">The Rhône Valley</button><button class=\"opt\" onclick=\"answer(this,3,3)\">Champagne</button><div class=\"feedback\" id=\"fb3\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">5. Virginia's Viognier is often compared to which French appellation for the same variety in WSET Level 3 and Diploma discussions?</div><button class=\"opt\" onclick=\"answer(this,4,0)\">Châteauneuf-du-Pape</button><button class=\"opt\" onclick=\"answer(this,4,1)\">Condrieu</button><button class=\"opt\" onclick=\"answer(this,4,2)\">Hermitage</button><button class=\"opt\" onclick=\"answer(this,4,3)\">Crozes-Hermitage</button><div class=\"feedback\" id=\"fb4\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">6. What minimum percentage of grapes must come from a named AVA for that AVA to be printed on a US wine label?</div><button class=\"opt\" onclick=\"answer(this,5,0)\">51%</button><button class=\"opt\" onclick=\"answer(this,5,1)\">75%</button><button class=\"opt\" onclick=\"answer(this,5,2)\">85%</button><button class=\"opt\" onclick=\"answer(this,5,3)\">100%</button><div class=\"feedback\" id=\"fb5\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">7. Which Virginia red variety is a native American Vitis aestivalis grape — NOT Vitis vinifera — giving it natural phylloxera resistance and a distinctive 'wild' character?</div><button class=\"opt\" onclick=\"answer(this,6,0)\">Cabernet Franc</button><button class=\"opt\" onclick=\"answer(this,6,1)\">Petit Verdot</button><button class=\"opt\" onclick=\"answer(this,6,2)\">Petit Manseng</button><button class=\"opt\" onclick=\"answer(this,6,3)\">Norton (Cynthiana)</button><div class=\"feedback\" id=\"fb6\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">8. In which Virginia AVA does Petit Verdot achieve perhaps its greatest expression outside of Bordeaux, where it is rarely ripened fully?</div><button class=\"opt\" onclick=\"answer(this,7,0)\">Rocky Knob</button><button class=\"opt\" onclick=\"answer(this,7,1)\">Eastern Shore</button><button class=\"opt\" onclick=\"answer(this,7,2)\">Monticello</button><button class=\"opt\" onclick=\"answer(this,7,3)\">North Fork of Roanoke</button><div class=\"feedback\" id=\"fb7\" style=\"display:none\"></div></div><div class=\"quiz-q\"><div class=\"q-text\">9. Petit Manseng is native to which French region, and why is it well-suited to Virginia's humid climate?</div><button class=\"opt\" onclick=\"answer(this,8,0)\">Alsace — because of its aromatic profile</button><button class=\"opt\" onclick=\"answer(this,8,1)\">Jura — because of its oxidative character</button><button class=\"opt\" onclick=\"answer(thi     opts: ["Terpenes","Thiols","Methoxypyrazines (pyrazines)","Esters"],
    ans: 2,
    exp: "Methoxypyrazines (colloquially 'pyrazines') are the chemical compounds responsible for green bell pepper, asparagus, and grassy aromas in Cabernet Franc, Cabernet Sauvignon, and Sauvignon Blanc. In Virginia, elevated pyrazines in red wines signal a cool or wet vintage in which insufficient heat accumulation prevented full phenolic ripeness."
  },
  {
    q: "Which Shenandoah Valley producer is widely considered one of Virginia's most technically accomplished wineries, known for single-vineyard Chardonnay and Cabernet Franc produced in a restrained, European style?",
    opts: ["Barboursville Vineyards","Horton Vineyards","Linden Vineyards","Chrysalis Vineyards"],
    ans: 2,
    exp: "Linden Vineyards, founded and operated by Jim Law in the Blue Ridge foothills, is one of Virginia's most respected producers. Law's understated, terroir-driven approach — minimal intervention, single-vineyard focus, and European-inspired precision — has produced Chardonnay and Cabernet Franc (Hardscrabble vineyard) widely regarded as among Virginia's finest wines."
  }
];

let score = 0;
let answered = 0;

function renderQuiz() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';
  QS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'quiz-q';
    div.innerHTML = `<div class="q-text">${i+1}. ${q.q}</div>` +
      q.opts.map((o, j) =>
        `<button class="opt" onclick="answer(this,${i},${j})">${o}</button>`
      ).join('') + `<div class="feedback" id="fb${i}" style="display:none"></div>`;
    wrap.appendChild(div);
  });
  updateScore();
}

function answer(btn, qi, oi) {
  const qDiv = btn.closest('.quiz-q');
  qDiv.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const correct = QS[qi].ans === oi;
  btn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) qDiv.querySelectorAll('.opt')[QS[qi].ans].classList.add('correct');
  const fb = document.getElementById('fb'+qi);
  fb.style.display = 'block';
  fb.className = 'feedback ' + (correct ? 'good' : 'bad');
  fb.textContent = QS[qi].exp;
  if (correct) score++;
  answered++;
  updateScore();
}

function updateScore() {
  document.getElementById('scoreDisp').textContent = score + ' / ' + QS.length;
}

function resetQuiz() {
  score = 0; answered = 0;
  renderQuiz();
}


function renderQuizSafe() {
  const wrap = document.getElementById('quizWrap'); const scoreEl = document.getElementById('scoreDisp');
  if (!wrap || !scoreEl) return;
  resetQuiz();
}
showHome();
</script>
</body></html>
